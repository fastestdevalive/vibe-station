<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <!-- interactive-widget=resizes-content: when the mobile soft keyboard opens,
         shrink the LAYOUT viewport (not just the visual viewport) so the full-height
         (height:100%) UI reflows above the keyboard instead of being overlaid by it.
         Chromium/Android honors this; iOS Safari ignores it (would need a
         visualViewport JS handler). -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <title>Vibe Station</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
